<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onland Data Entry</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <h1>
            🏛️ Onland Data Entry
            <span id="browserStatus" style="font-size: 14px; margin-left: 20px; padding: 5px 10px; border-radius: 4px; background: #e94560;">Browser: Initializing...</span>
        </h1>

        <!-- Search Form -->
        <div class="card">
            <h2>Search Property Records</h2>
            <form id="searchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lro">LRO (Land Registration Office)</label>
                        <input type="text" id="lro" name="lro" placeholder="e.g., 1234" required>
                    </div>
                    <div class="form-group">
                        <label for="descriptionType">Description Type</label>
                        <select id="descriptionType" name="descriptionType" required>
                            <option value="Concession">Concession</option>
                            <option value="Plan">Plan</option>
                            <option value="Section">Section</option>
                            <option value="Condo">Condo</option>
                            <option value="Parcel">Parcel</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="descriptionNumber">Description Number</label>
                        <input type="text" id="descriptionNumber" name="descriptionNumber" placeholder="e.g., 12345 or AB-123" required>
                    </div>
                </div>
                <button type="submit">Search Books</button>
                <span id="navControls" class="hidden" style="margin-left: auto;">
                    <input type="text" id="navDecision" placeholder="e.g., 0, +5, -3, +50%, 200" style="width: 200px;">
                    <button id="submitNavBtn" type="button">Go</button>
                    <button id="downloadSelectedBtn" type="button" class="hidden">Download Selected</button>
                </span>
            </form>
        </div>

        <!-- Controls -->
        <div class="card hidden">
            <h2>Controls</h2>
            <div class="form-row">
                <button id="startBtn" type="button">Start Browser</button>
                <button id="stopBtn" type="button" class="secondary" disabled>Stop Browser</button>
            </div>
            <div id="statusMessage"></div>
        </div>

        <!-- Webview Display -->
        <div class="card hidden" id="screenshotCard">
            <!-- Embedded webview for onland.ca -->
            <div class="webview-container">
                <webview id="onlandWebview"
                          src="https://www.onland.ca/ui/"
                          style="width:100%; height:500px; border:1px solid #0f3460; border-radius:8px;"
                          allowpopups
                          partition="persist:onland"></webview>
            </div>
        </div>
    </div>

    <!-- Log Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📋 Activity Logs</h2>
            <button class="clear-logs-btn" id="clearLogsBtn">Clear</button>
        </div>
        <div class="logs-container" id="logsContainer">
            <!-- Logs will be inserted here -->
        </div>
    </div>

    <script type="module">
        // Import modules
        import { initLogger, addLog } from './scripts/logger.js';
        import { initWebview, getWebview } from './scripts/webview-manager.js';
        import { initUI, showStatus } from './scripts/ui.js';
        import { setupSearchHandler, executeSearch } from './scripts/search-handler.js';
        import { setupNavigationHandler, executeNavCommand } from './scripts/navigation-handler.js';
        import { setupDownloadHandler } from './scripts/download-handler.js';
        import { pollForPageCount } from './scripts/page-navigator.js';
        import { captureScreenshot, installFetchInterceptor } from './scripts/screenshot.js';
        import { getState, setState } from './scripts/variables.js';

        // Get DOM elements
        const webview = document.getElementById('onlandWebview');
        const searchForm = document.getElementById('searchForm');
        const statusMessage = document.getElementById('statusMessage');
        const logsContainer = document.getElementById('logsContainer');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        const browserStatus = document.getElementById('browserStatus');
        const screenshotCard = document.getElementById('screenshotCard');

        // Initialize modules
        initLogger(logsContainer, clearLogsBtn);
        initWebview(webview, browserStatus, screenshotCard);
        initUI(statusMessage);
        setupSearchHandler(searchForm);

        // Setup navigation controls
        const navInput = document.getElementById('navDecision');
        const navBtn = document.getElementById('submitNavBtn');
        setupNavigationHandler(navInput, navBtn);

        // Setup Download Selected button
        const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
        setupDownloadHandler(downloadSelectedBtn);

        // Listen for nav commands from REST API (secondary display)
        if (window.electronAPI && window.electronAPI.onNavCommand) {
            window.electronAPI.onNavCommand((command) => {
                addLog('info', 'Nav command from secondary display: ' + command);
                executeNavCommand(command);
            });
        }

        // Listen for search commands from REST API (secondary display)
        if (window.electronAPI && window.electronAPI.onSearchCommand) {
            window.electronAPI.onSearchCommand((params) => {
                addLog('info', 'Search command from secondary display', params);
                // Populate form fields from the search command
                document.getElementById('lro').value = params.lro;
                document.getElementById('descriptionType').value = params.descType;
                document.getElementById('descriptionNumber').value = params.descNumber;
                executeSearch(params.lro, params.descType, params.descNumber, params.filter, params.descType2, params.descNumber2);
            });
        }

        // Listen for intercepted Onland page API URLs (from main process network filter)
        if (window.electronAPI && window.electronAPI.onPageApiUrl) {
            window.electronAPI.onPageApiUrl((data) => {
                // Extract base URL (without ?page=N) for reuse
                // e.g. "https://www.onland.ca/api/v1/books/transactions/34122282/pages"
                const baseUrl = data.url.split('?')[0];
                // Always update (each new book gets a different transaction ID)
                setState('pageApiBaseUrl', baseUrl);
                // Extract transaction ID from URL for direct API fetch
                const txMatch = data.url.match(/\/transactions\/(\d+)\//);
                if (txMatch) {
                    setState('transactionId', txMatch[1]);
                }
                addLog('success', 'Page API base URL captured', { baseUrl, method: data.method });
            });
        }

        // Listen for next-book command from REST API
        if (window.electronAPI && window.electronAPI.onNextBookCommand) {
            window.electronAPI.onNextBookCommand(() => {
                addLog('info', 'Next book command from secondary display');
                const webview = getWebview();
                if (!webview) return;

                // Use stored search URL (avoids double-encoding)
                const searchUrl = getState('searchUrl');
                if (!searchUrl) {
                    addLog('error', 'No search URL in state — perform a search first');
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                    return;
                }

                const totalBooks = getState('totalBooks') || 0;
                const currentBook = (getState('currentBook') || 1) + 1;

                if (currentBook > totalBooks) {
                    addLog('warning', 'No more books (' + currentBook + ' > ' + totalBooks + ')');
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                    return;
                }

                setState('currentBook', currentBook);
                addLog('info', 'Navigating to search URL for book ' + currentBook);

                // Navigate within the SPA using executeJavaScript (avoids loadURL issues)
                webview.executeJavaScript(`window.location.href = ${JSON.stringify(searchUrl)}`).then(() => {
                    // Wait for the SPA to load search results, then poll for View Details buttons
                    let polls = 0;
                    const maxPolls = 30;
                    const pollInterval = 1000;

                    const waitForResults = () => {
                        webview.executeJavaScript(`
                            (() => {
                                const viewBtns = document.querySelectorAll('button[aria-label*="View Details"]');
                                return { count: viewBtns.length };
                            })()
                        `).then(result => {
                            if (result && result.count >= currentBook) {
                                addLog('info', 'Opening book ' + currentBook);
                                webview.executeJavaScript(`
                                    (() => {
                                        const btns = document.querySelectorAll('button[aria-label*="View Details"]');
                                        if (btns[${currentBook - 1}]) {
                                            btns[${currentBook - 1}].click();
                                            return { clicked: true };
                                        }
                                        return { clicked: false };
                                    })()
                                `).then(clickResult => {
                                    if (clickResult && clickResult.clicked) {
                                        installFetchInterceptor(webview);
                                        const waitForBookPage = () => {
                                            webview.executeJavaScript('window.location.href').then(url => {
                                                if (url && !url.includes('/search')) {
                                                    pollForPageCount(webview, () => {
                                                        captureScreenshot(webview, (data) => {
                                                            if (data) addLog('info', 'Screenshot captured for book ' + currentBook);
                                                        });
                                                    });
                                                } else {
                                                    setTimeout(waitForBookPage, 500);
                                                }
                                            }).catch(() => setTimeout(waitForBookPage, 500));
                                        };
                                        waitForBookPage();
                                    } else {
                                        addLog('error', 'View Details button disappeared');
                                        if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                            window.electronAPI.pushScreenshot(null);
                                        }
                                    }
                                }).catch(err => {
                                    addLog('error', 'Click View Details failed: ' + err.message);
                                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                        window.electronAPI.pushScreenshot(null);
                                    }
                                });
                            } else if (polls < maxPolls) {
                                polls++;
                                setTimeout(waitForResults, pollInterval);
                            } else {
                                addLog('error', 'Timed out waiting for search results for next book');
                                if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                    window.electronAPI.pushScreenshot(null);
                                }
                            }
                        }).catch(err => {
                            addLog('warning', 'Results poll error (retrying): ' + (err.message || err));
                            if (polls < maxPolls) {
                                polls++;
                                setTimeout(waitForResults, pollInterval);
                            } else {
                                addLog('error', 'Timed out waiting for search results for next book (poll errors)');
                                if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                    window.electronAPI.pushScreenshot(null);
                                }
                            }
                        });
                    };
                    // Give the SPA time to navigate and render search results
                    setTimeout(waitForResults, 3000);
                }).catch(err => {
                    addLog('error', 'Failed to navigate to search URL: ' + (err.message || err));
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                });
            });
        }

        // Listen for prev-book command from REST API
        if (window.electronAPI && window.electronAPI.onPrevBookCommand) {
            window.electronAPI.onPrevBookCommand(() => {
                addLog('info', 'Prev book command from secondary display');
                const webview = getWebview();
                if (!webview) return;

                // Use stored search URL (avoids double-encoding)
                const searchUrl = getState('searchUrl');
                if (!searchUrl) {
                    addLog('error', 'No search URL in state — perform a search first');
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                    return;
                }

                const currentBook = (getState('currentBook') || 1) - 1;

                if (currentBook < 1) {
                    addLog('warning', 'Already on first book (' + (currentBook + 1) + ')');
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                    return;
                }

                setState('currentBook', currentBook);
                addLog('info', 'Navigating to search URL for book ' + currentBook);

                // Navigate within the SPA using executeJavaScript (avoids loadURL issues)
                webview.executeJavaScript(`window.location.href = ${JSON.stringify(searchUrl)}`).then(() => {
                    // Wait for the SPA to load search results, then poll for View Details buttons
                    let polls = 0;
                    const maxPolls = 30;
                    const pollInterval = 1000;

                    const waitForResults = () => {
                        webview.executeJavaScript(`
                            (() => {
                                const viewBtns = document.querySelectorAll('button[aria-label*="View Details"]');
                                return { count: viewBtns.length };
                            })()
                        `).then(result => {
                            if (result && result.count >= currentBook) {
                                addLog('info', 'Opening book ' + currentBook);
                                webview.executeJavaScript(`
                                    (() => {
                                        const btns = document.querySelectorAll('button[aria-label*="View Details"]');
                                        if (btns[${currentBook - 1}]) {
                                            btns[${currentBook - 1}].click();
                                            return { clicked: true };
                                        }
                                        return { clicked: false };
                                    })()
                                `).then(clickResult => {
                                    if (clickResult && clickResult.clicked) {
                                        installFetchInterceptor(webview);
                                        const waitForBookPage = () => {
                                            webview.executeJavaScript('window.location.href').then(url => {
                                                if (url && !url.includes('/search')) {
                                                    pollForPageCount(webview, () => {
                                                        captureScreenshot(webview, (data) => {
                                                            if (data) addLog('info', 'Screenshot captured for book ' + currentBook);
                                                        });
                                                    });
                                                } else {
                                                    setTimeout(waitForBookPage, 500);
                                                }
                                            }).catch(() => setTimeout(waitForBookPage, 500));
                                        };
                                        waitForBookPage();
                                    } else {
                                        addLog('error', 'View Details button disappeared');
                                        if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                            window.electronAPI.pushScreenshot(null);
                                        }
                                    }
                                }).catch(err => {
                                    addLog('error', 'Click View Details failed: ' + err.message);
                                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                        window.electronAPI.pushScreenshot(null);
                                    }
                                });
                            } else if (polls < maxPolls) {
                                polls++;
                                setTimeout(waitForResults, pollInterval);
                            } else {
                                addLog('error', 'Timed out waiting for search results for prev book');
                                if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                    window.electronAPI.pushScreenshot(null);
                                }
                            }
                        }).catch(err => {
                            addLog('warning', 'Results poll error (retrying): ' + (err.message || err));
                            if (polls < maxPolls) {
                                polls++;
                                setTimeout(waitForResults, pollInterval);
                            } else {
                                addLog('error', 'Timed out waiting for search results for prev book (poll errors)');
                                if (window.electronAPI && window.electronAPI.pushScreenshot) {
                                    window.electronAPI.pushScreenshot(null);
                                }
                            }
                        });
                    };
                    // Give the SPA time to navigate and render search results
                    setTimeout(waitForResults, 3000);
                }).catch(err => {
                    addLog('error', 'Failed to navigate to search URL: ' + (err.message || err));
                    if (window.electronAPI && window.electronAPI.pushScreenshot) {
                        window.electronAPI.pushScreenshot(null);
                    }
                });
            });
        }

        // Initialize log
        addLog('info', 'Onland Data Entry loaded');
        browserStatus.textContent = 'Browser: Loading...';
    </script>
</body>
</html>
