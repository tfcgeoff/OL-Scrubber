<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onland Data Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <h1>
            🏛️ Onland Data Entry
            <span id="browserStatus" style="font-size: 14px; margin-left: 20px; padding: 5px 10px; border-radius: 4px; background: #e94560;">Browser: Initializing...</span>
        </h1>

        <!-- Search Form -->
        <div class="card">
            <h2>Search Property Records</h2>
            <form id="searchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lro">LRO (Land Registration Office)</label>
                        <input type="text" id="lro" name="lro" placeholder="e.g., 1234" required>
                    </div>
                    <div class="form-group">
                        <label for="descriptionType">Description Type</label>
                        <select id="descriptionType" name="descriptionType" required>
                            <option value="Concession">Concession</option>
                            <option value="Plan">Plan</option>
                            <option value="Section">Section</option>
                            <option value="Condo">Condo</option>
                            <option value="Parcel">Parcel</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="descriptionNumber">Description Number</label>
                        <input type="text" id="descriptionNumber" name="descriptionNumber" placeholder="e.g., 12345 or AB-123" required>
                    </div>
                </div>
                <button type="submit">Search Books</button>
            </form>
        </div>

        <!-- Controls -->
        <div class="card hidden">
            <h2>Controls</h2>
            <div class="form-row">
                <button id="startBtn" type="button">Start Browser</button>
                <button id="stopBtn" type="button" class="secondary" disabled>Stop Browser</button>
            </div>
            <div id="statusMessage"></div>
        </div>

        <!-- Webview Display -->
        <div class="card hidden" id="screenshotCard">
            <!-- Embedded webview for onland.ca -->
            <div class="webview-container">
                <webview id="onlandWebview"
                          src="https://www.onland.ca/ui/"
                          style="width:100%; height:500px; border:1px solid #0f3460; border-radius:8px;"
                          disablewebsecurity
                          nodeintegration
                          allowpopups
                          partition="persist:onland"></webview>
            </div>
        </div>

        <!-- Navigation Controls -->
        <div class="card hidden" id="navigationCard">
            <h2>Navigation Control</h2>
            <div class="status">
                <strong>AI Decision:</strong> Enter navigation command (0=add, -1=back 1, +1=forward 1, 5=go to page 5)
            </div>
            <div class="navigation-controls">
                <input type="text" id="navDecision" placeholder="0, -1, +1, or page number" style="width: 300px;">
                <button id="submitNavBtn">Submit Navigation</button>
            </div>
            <div id="navStatus"></div>
        </div>
    </div>

    <!-- Log Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📋 Activity Logs</h2>
            <button class="clear-logs-btn" id="clearLogsBtn">Clear</button>
        </div>
        <div class="logs-container" id="logsContainer">
            <!-- Logs will be inserted here -->
        </div>
    </div>

    <script>
        // Direct webview automation - simplified URL approach
        const webview = document.getElementById('onlandWebview');
        const searchForm = document.getElementById('searchForm');
        const statusMessage = document.getElementById('statusMessage');
        const logsContainer = document.getElementById('logsContainer');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        const browserStatus = document.getElementById('browserStatus');
        const screenshotCard = document.getElementById('screenshotCard');

        // Store webview webContents reference for screenshots
        let webviewWebContents = null;

        function addLog(level, message, data = null, screenshot = null) {
            console.log(`[${level.toUpperCase()}]`, message, data || '');
            const entry = document.createElement('div');
            entry.className = `log-entry ${level}`;

            const time = document.createElement('span');
            time.className = 'log-timestamp';
            time.textContent = `[${new Date().toLocaleTimeString()}] `;

            const msg = document.createElement('span');
            msg.className = 'log-message';
            msg.textContent = message;

            entry.appendChild(time);
            entry.appendChild(msg);

            if (data) {
                const dataDiv = document.createElement('div');
                dataDiv.className = 'log-data';
                dataDiv.textContent = JSON.stringify(data, null, 2);
                entry.appendChild(dataDiv);
            }

            // Add screenshot if provided
            if (screenshot) {
                const screenshotDiv = document.createElement('div');
                screenshotDiv.className = 'log-screenshot';
                const img = document.createElement('img');
                img.src = 'data:image/png;base64,' + screenshot;
                img.alt = message;
                img.style.maxWidth = '100%';
                img.style.cursor = 'pointer';
                img.style.borderRadius = '4px';
                img.style.marginTop = '8px';
                // Make screenshot clickable to view full size
                img.onclick = () => {
                    const win = window.open();
                    win.document.write('<img src="' + img.src + '" style="width:100%"/>');
                };
                screenshotDiv.appendChild(img);
                entry.appendChild(screenshotDiv);
            }

            logsContainer.appendChild(entry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        clearLogsBtn.addEventListener('click', () => {
            logsContainer.innerHTML = '';
        });

        // Webview loaded - capture webContents for screenshots
        webview.addEventListener('dom-ready', () => {
            // Store webContents reference for screenshot capture
            try {
                const webContents = require('electron').remote.webContents.fromId(webview.getWebContentsId());
                webviewWebContents = webContents;
                addLog('info', 'Webview webContents captured for screenshots');
            } catch (err) {
                console.error('Could not capture webContents:', err);
            }

            addLog('info', 'Webview loaded - ready for searches');
            browserStatus.textContent = 'Browser: Ready ✓';
            browserStatus.style.background = '#1b4332';
            screenshotCard.classList.remove('hidden');
        });

        // Search form submission - use direct URL
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const lro = document.getElementById('lro').value.trim();
            const descType = document.getElementById('descriptionType').value;
            const descNumber = document.getElementById('descriptionNumber').value.trim();

            if (!lro || !descNumber) {
                addLog('error', 'Please fill in all fields');
                showStatus('Please fill in LRO and Description Number', 'error');
                return;
            }

            try {
                addLog('info', 'Navigating to search page', { lro, descType, descNumber });

                // Navigate directly to the LRO-specific search page
                const searchUrl = `https://www.onland.ca/ui/${lro}/books/search`;
                webview.src = searchUrl;

                addLog('info', 'Waiting for page load...');

                // Wait for navigation and then fill in the form
                webview.addEventListener('dom-ready', function fillForm() {
                    addLog('success', 'Search page loaded', { url: searchUrl });

                    // Wait for Angular to render (add delay)
                    setTimeout(() => {
                        addLog('info', 'Waiting for Angular to render form...');

                        const fullScript = `
                            (() => {
                                const descType = ${JSON.stringify(descType)};
                                const descNumber = ${JSON.stringify(descNumber)};
                                const log = [];

                                // Check what we can see
                                log.push({ step: 'page-check', title: document.title, url: window.location.href });

                                // Check if Angular has loaded
                                const angularApp = document.querySelector('[ng-version]');
                                log.push({ step: 'angular-check', hasAngular: !!angularApp });

                                // Page analysis
                                const inputs = document.querySelectorAll('input');
                                const buttons = Array.from(document.querySelectorAll('button'));
                                log.push({ step: 'analysis', inputCount: inputs.length, buttonCount: buttons.length });

                                // Log all inputs for debugging (commented out - working now)
                                /*
                                inputs.forEach((inp, i) => {
                                    log.push({ step: 'input', index: i, placeholder: inp.placeholder, ariaLabel: inp.getAttribute('aria-labelledby'), type: inp.type, value: inp.value });
                                });

                                // Log button texts (commented out - working now)
                                buttons.forEach((btn, i) => {
                                    log.push({ step: 'button', index: i, text: btn.textContent.trim().substring(0, 30) });
                                });
                                */

                                // If no inputs, the form hasn't loaded yet
                                if (inputs.length === 0) {
                                    log.push({ step: 'error', message: 'No inputs found - form may not be loaded yet' });
                                    return { success: false, log };
                                }

                                // === Step 1: Log all inputs with full details ===
                                log.push({ step: 'input-analysis', totalInputs: inputs.length });
                                inputs.forEach((inp, i) => {
                                    log.push({
                                        step: 'input-details',
                                        index: i,
                                        placeholder: inp.placeholder || '(none)',
                                        ariaLabel: inp.getAttribute('aria-label') || inp.getAttribute('aria-labelledby') || '(none)',
                                        type: inp.type || '(unknown)',
                                        id: inp.id || '(none)',
                                        name: inp.name || '(none)',
                                        value: inp.value || '(empty)'
                                    });
                                });

                                // === Step 2: Find inputs by their purpose ===
                                let typeInput = null;
                                let numInput = null;

                                // First try: Find by aria-label or placeholder content
                                for (let i = 0; i < inputs.length; i++) {
                                    const inp = inputs[i];
                                    const ariaLabel = (inp.getAttribute('aria-label') || inp.getAttribute('aria-labelledby') || '').toLowerCase();
                                    const placeholder = (inp.placeholder || '').toLowerCase();

                                    // Look for Description Type input (triggers dropdown)
                                    if (!typeInput) {
                                        if (ariaLabel.includes('description') && (ariaLabel.includes('type') || placeholder.includes('type'))) {
                                            typeInput = inp;
                                            log.push({ step: 'found-type-by-label', index: i, ariaLabel, placeholder });
                                        } else if (placeholder.includes('description') && placeholder.includes('type')) {
                                            typeInput = inp;
                                            log.push({ step: 'found-type-by-placeholder', index: i, placeholder });
                                        }
                                    }

                                    // Look for Property Description Number input
                                    if (!numInput) {
                                        const hasDesc = ariaLabel.includes('description') || placeholder.includes('description');
                                        const hasNum = ariaLabel.includes('number') || placeholder.includes('number');
                                        const hasOther = ariaLabel.includes('other') || placeholder.includes('other');

                                        if (hasDesc && hasNum && !hasOther) {
                                            numInput = inp;
                                            log.push({ step: 'found-number-by-label', index: i, ariaLabel, placeholder });
                                        }
                                    }
                                }

                                // === Step 3: Fallback to positional logic if not found ===
                                if (!typeInput && inputs.length >= 1) {
                                    typeInput = inputs[0];
                                    log.push({ step: 'type-input-fallback', index: 0, reason: 'first-input' });
                                }

                                if (!numInput && inputs.length >= 2) {
                                    // Check if second input looks like "other" field
                                    const secondInput = inputs[1];
                                    const ariaLabel = (secondInput.getAttribute('aria-label') || secondInput.getAttribute('aria-labelledby') || '').toLowerCase();
                                    const placeholder = (secondInput.placeholder || '').toLowerCase();
                                    const isOtherField = ariaLabel.includes('other') || placeholder.includes('other');

                                    if (isOtherField && inputs.length >= 3) {
                                        numInput = inputs[2];
                                        log.push({ step: 'number-input-fallback', index: 2, reason: 'third-input-skipped-other' });
                                    } else {
                                        numInput = inputs[1];
                                        log.push({ step: 'number-input-fallback', index: 1, reason: 'second-input' });
                                    }
                                }

                                // === Step 4: Fill Description Type and handle dropdown ===
                                if (typeInput) {
                                    log.push({ step: 'filling-type', inputIndex: Array.from(inputs).indexOf(typeInput), value: descType });
                                    typeInput.click();
                                    typeInput.focus();
                                    typeInput.value = descType;
                                    typeInput.dispatchEvent(new Event('input', { bubbles: true }));
                                    typeInput.dispatchEvent(new Event('change', { bubbles: true }));

                                    // Wait for dropdown to appear and select an option
                                    setTimeout(() => {
                                        const options = document.querySelectorAll('mat-option');
                                        log.push({ step: 'dropdown-check', optionCount: options.length });

                                        if (options.length > 0) {
                                            // Click the first option (Abstract/Parcel Register Book)
                                            options[0].click();
                                            log.push({ step: 'selected-option', optionText: options[0].textContent.trim().substring(0, 50) });
                                        } else {
                                            log.push({ step: 'warning', message: 'No mat-option elements found for dropdown' });
                                        }
                                    }, 500);
                                } else {
                                    log.push({ step: 'error', message: 'Could not find Description Type input' });
                                }

                                // === Step 5: Fill Description Number ===
                                if (numInput) {
                                    log.push({ step: 'filling-number', inputIndex: Array.from(inputs).indexOf(numInput), value: descNumber });
                                    numInput.click();
                                    numInput.focus();
                                    numInput.value = descNumber;
                                    numInput.dispatchEvent(new Event('input', { bubbles: true }));
                                    numInput.dispatchEvent(new Event('change', { bubbles: true }));
                                } else {
                                    log.push({ step: 'error', message: 'Could not find Description Number input' });
                                }

                                // Find search button by ID (more reliable)
                                const searchBtn = document.getElementById('searchButton');
                                if (searchBtn) {
                                    log.push({ step: 'found search button', id: 'searchButton' });

                                    // Click multiple times to ensure submission
                                    let clickCount = 0;
                                    const maxClicks = 5;
                                    const clickInterval = setInterval(() => {
                                        searchBtn.click();
                                        clickCount++;
                                        log.push({ step: 'clicked search', count: clickCount });

                                        if (clickCount >= maxClicks) {
                                            clearInterval(clickInterval);
                                        }
                                    }, 1000);
                                } else {
                                    log.push({ step: 'error', message: 'searchButton not found by ID' });
                                }

                                return { success: true, log };
                            })()
                        `;

                        webview.executeJavaScript(fullScript).then(result => {
                            addLog('info', 'Execution complete', result.log);
                            if (result.success) {
                                addLog('success', 'Search submitted!');

                                // Wait for results page and look for "View Details" buttons
                                setTimeout(() => {
                                    webview.executeJavaScript(`
                                        (() => {
                                            const log = [];

                                            // Look for View Details buttons
                                            const viewBtns = document.querySelectorAll('button[aria-label*="View Details"]');
                                            log.push({ step: 'found view buttons', count: viewBtns.length });

                                            if (viewBtns.length > 0) {
                                                const firstBtn = viewBtns[0];
                                                const ariaLabel = firstBtn.getAttribute('aria-label');
                                                log.push({ step: 'clicking first button', ariaLabel: ariaLabel, html: firstBtn.outerHTML });

                                                firstBtn.click();
                                                log.push({ step: 'clicked view details', success: true });

                                                // Take screenshot after clicking
                                                return { found: true, clicked: true, log };
                                            }

                                            log.push({ step: 'no view buttons found' });
                                            return { found: false, clicked: false, log };
                                        })()
                                    `).then(viewResult => {
                                        addLog('info', 'View Details click result', viewResult.log);

                                        // Poll for page-count element
                                        const pollForPageCount = (pollCount = 0) => {
                                            const maxPolls = 30; // 15 seconds total

                                            webview.executeJavaScript(`
                                                (() => {
                                                    // Get elements by class name "page-count"
                                                    const pageCountDivs = document.getElementsByClassName('page-count');

                                                    if (pageCountDivs.length === 0) {
                                                        return { found: false, method: 'no-page-count-divs' };
                                                    }

                                                    // Get the first page-count div and find the <p> inside it
                                                    const firstDiv = pageCountDivs[0];
                                                    const pElement = firstDiv.querySelector('p');

                                                    if (!pElement) {
                                                        return { found: false, method: 'no-p-element' };
                                                    }

                                                    const text = pElement.textContent || pElement.innerText || '';
                                                    const match = text.match(/of\\s+(\\d+)/);

                                                    if (!match) {
                                                        return { found: false, method: 'no-match', text: text };
                                                    }

                                                    const totalPages = parseInt(match[1], 10);
                                                    const middlePage = Math.floor(totalPages / 2);

                                                    return {
                                                        found: true,
                                                        totalPages: totalPages,
                                                        middlePage: middlePage,
                                                        text: text
                                                    };
                                                })()
                                            `).then(pageResult => {
                                                if (pageResult.found) {
                                                    addLog('success', 'Page count loaded - navigating to middle page', {
                                                        totalPages: pageResult.totalPages,
                                                        middlePage: pageResult.middlePage,
                                                        originalText: pageResult.text
                                                    });

                                                    // Navigate to middle page
                                                    webview.executeJavaScript(`
                                                        (() => {
                                                            const currentUrl = window.location.href;
                                                            const middlePage = ${pageResult.middlePage};

                                                            // Parse page number from URL or construct new URL
                                                            let newUrl;
                                                            if (currentUrl.includes('/books/search/')) {
                                                                // URL format: /books/search/{some-path}
                                                                const parts = currentUrl.split('/books/search/');
                                                                if (parts.length > 1) {
                                                                    const searchPath = parts[1].split('?')[0]; // Get path before query string
                                                                    // Check if there's already a page parameter
                                                                    const urlObj = new URL(currentUrl);
                                                                    urlObj.searchParams.set('page', middlePage);
                                                                    newUrl = urlObj.href;
                                                                } else {
                                                                    newUrl = currentUrl + '?page=' + middlePage;
                                                                }
                                                            } else {
                                                                const urlObj = new URL(currentUrl);
                                                                urlObj.searchParams.set('page', middlePage);
                                                                newUrl = urlObj.href;
                                                            }

                                                            // Navigate to the middle page
                                                            window.location.href = newUrl;

                                                            return {
                                                                navigated: true,
                                                                middlePage: middlePage,
                                                                newUrl: newUrl,
                                                                oldUrl: currentUrl
                                                            };
                                                        })()
                                                    `).then(navResult => {
                                                        addLog('info', 'Navigated to middle page', {
                                                            middlePage: navResult.middlePage,
                                                            newUrl: navResult.newUrl
                                                        });

                                                        // Wait 2 seconds for page to load, then take screenshot
                                                        setTimeout(() => {
                                                            takeScreenshot();
                                                        }, 2000);
                                                    }).catch(navErr => {
                                                        addLog('error', 'Navigation failed: ' + navErr.message);
                                                        // Take screenshot anyway after navigation attempt
                                                        setTimeout(() => {
                                                            takeScreenshot();
                                                        }, 2000);
                                                    });
                                                } else if (pollCount < maxPolls) {
                                                    // Poll again after 500ms
                                                    setTimeout(() => pollForPageCount(pollCount + 1), 500);
                                                } else {
                                                    // Max polls reached - log error but still take screenshot
                                                    addLog('error', 'Page count not found after 10 seconds - taking screenshot anyway');
                                                    takeScreenshot();
                                                }
                                            }).catch(err => {
                                                addLog('error', 'Page count polling failed: ' + err.message);
                                                // Take screenshot anyway on error
                                                if (pollCount >= maxPolls) {
                                                    takeScreenshot();
                                                } else {
                                                    setTimeout(() => pollForPageCount(pollCount + 1), 500);
                                                }
                                            });
                                        };

                                        // Start polling AFTER book loads (2.5 seconds)
                                        setTimeout(() => pollForPageCount(0), 2500);

                                        // Screenshot capture function - text-based fallback
                                        const takeScreenshot = () => {
                                            webview.executeJavaScript(`
                                                (() => {
                                                    try {
                                                        const pageInfo = {
                                                            title: document.title,
                                                            url: window.location.href,
                                                            timestamp: new Date().toISOString(),
                                                            visibleElements: {
                                                                inputs: document.querySelectorAll('input').length,
                                                                buttons: document.querySelectorAll('button').length,
                                                                links: document.querySelectorAll('a').length,
                                                                textContent: document.body.innerText.substring(0, 5000)
                                                            }
                                                        };

                                                        // Try to extract page counts using getElementsByClassName
                                                        const pageCountDivs = document.getElementsByClassName('page-count');
                                                        if (pageCountDivs.length > 0) {
                                                            const pElement = pageCountDivs[0].querySelector('p');
                                                            if (pElement) {
                                                                const text = pElement.textContent || pElement.innerText;
                                                                const match = text.match(/of\\s+(\\d+)/);
                                                                if (match) {
                                                                    pageInfo.totalPages = parseInt(match[1], 10);
                                                                }
                                                            }
                                                        }

                                                        return JSON.stringify(pageInfo);
                                                    } catch (err) {
                                                        return JSON.stringify({
                                                            error: err.message,
                                                            title: document.title,
                                                            url: window.location.href
                                                        });
                                                    }
                                                })()
                                            `).then(jsonData => {
                                                const pageData = JSON.parse(jsonData);
                                                addLog('info', 'Page snapshot captured', pageData);
                                            }).catch(err => {
                                                addLog('error', 'Page snapshot capture exception', {
                                                    message: err.message,
                                                    stack: err.stack ? err.stack.split('\n').slice(0, 3).join('\n') : 'no stack'
                                                });
                                            });
                                        };
                                    }).catch(err => {
                                        addLog('error', 'View Details execution failed: ' + err.message);
                                    });
                                }, 5000); // Wait 5 seconds for results page

                                showStatus('Search submitted successfully', 'success');
                            } else {
                                addLog('warning', 'Search may not have completed');
                                showStatus('May not have completed search', 'warning');
                            }
                        }).catch(err => {
                            addLog('error', 'Execution failed: ' + err.message);
                            console.error('Error:', err);
                        });
                    }, 3000); // Wait 3 seconds for Angular

                    // Remove this listener after first use
                    webview.removeEventListener('dom-ready', fillForm);
                });

            } catch (error) {
                addLog('error', 'Search failed', error.message);
                showStatus('Error: ' + error.message, 'error');
            }
        });

        function showStatus(message, type = 'success') {
            statusMessage.innerHTML = message;
            statusMessage.className = 'status ' + type;
            setTimeout(() => {
                statusMessage.className = 'status';
            }, 5000);
        }

        // Initialize
        addLog('info', 'Onland Data Entry loaded');
        browserStatus.textContent = 'Browser: Loading...';
    </script>
</body>
</html>
