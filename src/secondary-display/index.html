<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onland - Remote Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 18px;
            color: #e94560;
        }
        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 3px;
            background: #1b4332;
            color: #95d5b2;
        }
        .status.error {
            background: #6a040f;
            color: #fca5a5;
        }

        /* Search panel */
        .search-panel {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #0f3460;
        }
        .search-panel label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-panel input,
        .search-panel select {
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #0a0a23;
            color: #e0e0e0;
            font-size: 14px;
        }
        .search-panel input:focus,
        .search-panel select:focus {
            outline: none;
            border-color: #e94560;
        }
        .search-panel select {
            cursor: pointer;
        }
        .btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn-primary { background: #e94560; }
        .btn-primary:hover { background: #c73050; }
        .btn-secondary { background: #0f3460; }
        .btn-secondary:hover { background: #1a4a80; }

        /* Screenshot area */
        .screenshot-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 16px;
            background: #0a0a23;
            min-height: 300px;
            overflow-y: auto;
        }
        .screenshot-container img {
            width: 90vw;
            max-width: 90vw;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .screenshot-placeholder {
            color: #555;
            font-size: 14px;
        }

        /* Bottom controls */
        .controls {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #0f3460;
        }
        .controls input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #0a0a23;
            color: #e0e0e0;
            font-size: 14px;
        }
        .controls input[type="text"]:focus {
            outline: none;
            border-color: #e94560;
        }
        .controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #a0a0a0;
            cursor: pointer;
            margin-left: auto;
        }
        .controls input[type="checkbox"] {
            width: auto;
            flex: none;
        }

        /* Quick nav buttons */
        .quick-nav {
            display: flex;
            gap: 6px;
        }
        .quick-nav button {
            padding: 6px 12px;
            background: #1a1a3e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .quick-nav button:hover {
            background: #0f3460;
        }
        .quick-nav button.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Onland - Remote Control</h1>
        <span class="status" id="connectionStatus" style="display: none;"></span>
    </div>

    <!-- Search Panel -->
    <div class="search-panel">
        <label for="searchLro">LRO</label>
        <input type="text" id="searchLro" placeholder="LRO" style="width: 80px;">
        <label for="searchDescType">Type</label>
        <select id="searchDescType" style="width: 130px;">
            <option value="Concession">Concession</option>
            <option value="Plan">Plan</option>
            <option value="Section">Section</option>
            <option value="Condo">Condo</option>
            <option value="Parcel">Parcel</option>
        </select>
        <label for="searchDescNum">#</label>
        <input type="text" id="searchDescNum" placeholder="#" style="width: 100px;">
        <label for="searchFilter">Filter</label>
        <input type="text" id="searchFilter" placeholder="Filter" style="width: 120px;">
        <button class="btn btn-primary" id="searchBtn">Search</button>
        <button class="btn btn-secondary" id="searchNextBookBtn">Next Book</button>
        <button class="btn btn-secondary" id="searchLastBookBtn">Last Book</button>
        <button class="btn btn-secondary" id="searchAddBtn">+ Add Page</button>
        <button class="btn btn-secondary" id="searchDownloadBtn">Download Selected</button>
    </div>

    <!-- Navigation Controls (replaces state bar — puts nav at top) -->
    <div class="controls">
        <div class="quick-nav">
            <button data-cmd="-10">-10</button>
            <button data-cmd="-1">-1</button>
            <button data-cmd="+1">+1</button>
            <button data-cmd="+10">+10</button>
            <button data-cmd="+25%">+25%</button>
            <button data-cmd="50%">50%</button>
            <button data-cmd="+75%">+75%</button>
        </div>
        <input type="text" id="navInput" placeholder="Custom: e.g., 0, +5, -3, +50%, 200">
        <button class="btn btn-primary" id="navSendBtn">Go</button>
    </div>

    <!-- Screenshot -->
    <div class="screenshot-container" id="screenshotContainer">
        <span class="screenshot-placeholder" id="placeholder">Waiting for screenshot...</span>
        <img id="screenshotImg" style="display: none;" alt="Onland screenshot">
        <embed id="screenshotPdf" type="application/pdf" style="display: none; width: 90vw; height: 85vh; border: none; border-radius: 8px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);">
    </div>

    <script>
        // DOM refs
        const connectionStatus = document.getElementById('connectionStatus');
        const screenshotImg = document.getElementById('screenshotImg');
        const screenshotPdf = document.getElementById('screenshotPdf');
        const placeholder = document.getElementById('placeholder');
        const navInput = document.getElementById('navInput');
        const searchLro = document.getElementById('searchLro');
        const searchDescType = document.getElementById('searchDescType');
        const searchDescNum = document.getElementById('searchDescNum');
        const searchFilter = document.getElementById('searchFilter');

        // ---- Display screenshot from base64 ----
        function showScreenshot(base64) {
            if (!base64) return;
            screenshotImg.style.display = 'none';
            screenshotPdf.style.display = 'none';
            placeholder.style.display = 'none';

            // Detect content type from base64 header bytes
            const isPdf = base64.startsWith('JVBERi0');   // %PDF-
            const isPng = base64.startsWith('iVBORw0');   // \x89PNG

            if (isPdf) {
                screenshotPdf.src = 'data:application/pdf;base64,' + base64;
                screenshotPdf.style.display = 'block';
            } else if (isPng) {
                screenshotImg.src = 'data:image/png;base64,' + base64;
                screenshotImg.style.display = 'block';
            } else {
                placeholder.textContent = 'Unknown format (' + (base64.length * 0.75 / 1024).toFixed(0) + ' KB)';
                placeholder.style.display = 'block';
            }
        }

        // ---- Send command, get screenshot back ----
        function sendCommand(params) {
            connectionStatus.textContent = 'Requesting...';
            connectionStatus.style.display = '';
            connectionStatus.className = 'status';

            const qs = new URLSearchParams(params).toString();
            fetch('/api?' + qs)
                .then(res => {
                    if (!res.ok) return res.json().then(err => { throw new Error(err.error || 'HTTP ' + res.status); });
                    return res.json();
                })
                .then(data => {
                    connectionStatus.style.display = 'none';
                    if (data.screenshot) {
                        showScreenshot(data.screenshot);
                    }
                    if (data.pdf) {
                        // Handle PDF download response
                        const blob = atob(data.pdf.base64Data);
                        const arr = new Uint8Array(blob.length);
                        for (let i = 0; i < blob.length; i++) arr[i] = blob.charCodeAt(i);
                        const file = new Blob([arr], { type: 'application/pdf' });
                        const url = URL.createObjectURL(file);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = data.pdf.filename || 'onland.pdf';
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                })
                .catch(err => {
                    connectionStatus.textContent = err.message || 'Error';
                    connectionStatus.style.display = '';
                    connectionStatus.className = 'status error';
                });
        }

        // ---- Search ----
        function sendSearch() {
            const lro = searchLro.value.trim();
            const descType = searchDescType.value;
            const descNumber = searchDescNum.value.trim();
            const filter = searchFilter.value.trim();
            if (!lro || !descType || !descNumber) return;
            const params = { lro, descType, descNumber };
            if (filter) params.filter = filter;
            sendCommand(params);
        }

        document.getElementById('searchBtn').addEventListener('click', sendSearch);
        [searchLro, searchDescNum, searchFilter].forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); sendSearch(); }
            });
        });

        // Next Book, Last Book, Add Page, Download
        document.getElementById('searchNextBookBtn').addEventListener('click', () => sendCommand({ nextBook: 'true' }));
        document.getElementById('searchLastBookBtn').addEventListener('click', () => sendCommand({ lastBook: 'true' }));
        document.getElementById('searchAddBtn').addEventListener('click', () => sendCommand({ incAmt: '0' }));
        document.getElementById('searchDownloadBtn').addEventListener('click', () => sendCommand({ DL: 'true' }));

        // ---- Navigation ----
        function sendNavCommand(cmd) {
            const command = cmd || navInput.value.trim();
            if (!command) return;
            sendCommand({ incAmt: command });
            if (!cmd) navInput.value = '';
        }

        document.getElementById('navSendBtn').addEventListener('click', () => sendNavCommand());
        navInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sendNavCommand(); }
        });

        // Quick nav buttons
        document.querySelectorAll('.quick-nav button').forEach(btn => {
            btn.addEventListener('click', () => sendNavCommand(btn.dataset.cmd));
        });

        // ---- Update Next Book button label with current book count ----
        const nextBookBtn = document.getElementById('searchNextBookBtn');
        function updateBookLabel() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    if (data.state && data.state.currentBook && data.state.totalBooks) {
                        nextBookBtn.textContent = `Next Book (${data.state.currentBook}/${data.state.totalBooks})`;
                    } else {
                        nextBookBtn.textContent = 'Next Book';
                    }
                })
                .catch(() => {});
        }
        updateBookLabel();
        setInterval(updateBookLabel, 3000);
    </script>
</body>
</html>
